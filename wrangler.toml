name = "defendml-api"
main = "worker.js"
# FIX #6: bumped from 2024-01-01 — enables AbortSignal.timeout() + modern APIs
compatibility_date = "2025-01-01"
workers_dev = true

# KV Namespaces
# FIX #9: removed unused AUTH_USERS binding (was never referenced in worker.js)
[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "a3c27a772f0746e183be83a924a4d94b"

[[kv_namespaces]]
binding = "AUDIT_LOG"
id = "e30011d67c0a47c395da47751419cd58"

# Default Variables (set via Cloudflare dashboard for secrets)
[vars]
CORS_ORIGIN = "https://defendml.com,https://app.defendml.com,https://defendml-app.pages.dev"
MOCK_MODE = "false"
STRICT_MODE = "false"

# Secrets — set these in the Cloudflare Workers dashboard (not here):
# SUPABASE_URL
# SUPABASE_SERVICE_ROLE_KEY   ← FIX #7: standardised name (was SUPABASE_SERVICE_ROLE)
# SUPABASE_ANON_KEY
# INGEST_API_KEY
# ANTHROPIC_API_KEY
# ANTHROPIC_MODEL

[build]
command = ""
upload.format = "modules"
